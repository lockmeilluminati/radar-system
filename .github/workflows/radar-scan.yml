name: Tactical Scan Automation
on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [ master ]
  workflow_dispatch: # <--- Adds a manual "Run" button in GitHub Actions
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: node radar-parser.mjs
      env:
        FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

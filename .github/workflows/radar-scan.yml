name: Tactical Scan Automation
on:
  schedule:
    - cron: '*/10 * * * *' # Adjusted to 10-minute intervals to bypass aggressive queuing
  push:
    branches: [ master ] # Still runs immediately if you manually push code
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: node radar-parser.mjs
      env:
        FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
